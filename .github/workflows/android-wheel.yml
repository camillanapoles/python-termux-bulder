name: Android Wheel Factory

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Versão Python (ex: 3.12)'
        required: true
        default: '3.12'
      package_name:
        description: 'Nome do Pacote (ex: jiter)'
        required: true
      package_version:
        description: 'Versão (DEIXE EM BRANCO para a mais recente)'
        required: false
        default: ''
      arch:
        description: 'Arquitetura alvo (aarch64, x86_64, armv7l, i686)'
        required: false
        default: 'aarch64'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      ANDROID_API: 24
      ARCH: ${{ inputs.arch }}
      TARGET: ${{ inputs.arch == 'aarch64' && 'aarch64-linux-android' || inputs.arch == 'x86_64' && 'x86_64-linux-android' || inputs.arch == 'armv7l' && 'armv7a-linux-androideabi' || inputs.arch == 'i686' && 'i686-linux-android' || 'aarch64-linux-android' }}
      SYSROOT_DIR: ${{ github.workspace }}/.cache/android-sysroot

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'
          cache-dependency-path: requirements-build.txt

      - name: 📱 Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: ⚡ Cache Rust Toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.rustup/
          key: rust-${{ env.TARGET }}-py${{ inputs.python_version }}
          restore-keys: |
            rust-${{ env.TARGET }}-
            rust-

      - name: 🦀 Setup Rust & PyO3 Env
        run: |
          set -e
          rustup target add ${{ env.TARGET }}
          pip install --upgrade pip maturin
          
          echo "PYO3_PYTHON=$(which python3)" >> $GITHUB_ENV
          echo "PYO3_NO_PYTHON_LINKING=1" >> $GITHUB_ENV
          
          NDK_TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          # Mapear arquitetura para prefixo do linker
          case "${{ env.ARCH }}" in
            aarch64)
              LLVM_TRIPLE="aarch64-linux-android"
              CARGO_TRIPLE="AARCH64_LINUX_ANDROID"
              ;;
            x86_64)
              LLVM_TRIPLE="x86_64-linux-android"
              CARGO_TRIPLE="X86_64_LINUX_ANDROID"
              ;;
            armv7l)
              LLVM_TRIPLE="armv7a-linux-androideabi"
              CARGO_TRIPLE="ARMV7A_LINUX_ANDROIDEABI"
              ;;
            i686)
              LLVM_TRIPLE="i686-linux-android"
              CARGO_TRIPLE="I686_LINUX_ANDROID"
              ;;
            *)
              echo "❌ Arquitetura não suportada: ${{ env.ARCH }}"
              exit 1
              ;;
          esac
          
          echo "CARGO_TARGET_${CARGO_TRIPLE}_LINKER=$NDK_TOOLCHAIN/${LLVM_TRIPLE}${{ env.ANDROID_API }}-clang" >> $GITHUB_ENV
          echo "CC_${LLVM_TRIPLE//-/_}=$NDK_TOOLCHAIN/${LLVM_TRIPLE}${{ env.ANDROID_API }}-clang" >> $GITHUB_ENV
          echo "CXX_${LLVM_TRIPLE//-/_}=$NDK_TOOLCHAIN/${LLVM_TRIPLE}${{ env.ANDROID_API }}-clang++" >> $GITHUB_ENV

      - name: 📚 Create Fake libpython for Linker
        run: |
          set -e
          PYTHON_VER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          mkdir -p fake_libs
          touch fake_libs/libpython${PYTHON_VER}.so
          echo "RUSTFLAGS=-L ${{ github.workspace }}/fake_libs -C link-arg=-Wl,--unresolved-symbols=ignore-all -C link-arg=-Wl,--allow-shlib-undefined" >> $GITHUB_ENV

      - name: 📦 Cache Android Python Sysroot
        uses: actions/cache@v4
        with:
          path: ${{ env.SYSROOT_DIR }}
          key: sysroot-${{ inputs.arch }}-py${{ inputs.python_version }}

      - name: 🐍 Prepare Android Python Sysroot (para maturin/PyO3)
        run: |
          ./.github/scripts/prepare-android-python.sh \
            "${{ env.ARCH }}" \
            "${{ env.ANDROID_API }}" \
            "${{ inputs.python_version }}"

      - name: 🏗️ Download & Build Wheel
        run: |
          set -e
          mkdir -p build_area && cd build_area
          
          PKG="${{ inputs.package_name }}"
          VER="${{ inputs.package_version }}"
          
          # LÓGICA DE DEFAULT PYTHONICA
          if [ -z "$VER" ]; then
            echo "📥 Versão não especificada. Baixando a versão mais recente de $PKG..."
            pip download --no-binary :all: --no-deps "$PKG"
          else
            echo "📥 Baixando $PKG na versão exata $VER..."
            pip download --no-binary :all: --no-deps "$PKG==$VER"
          fi
          
          tar -xzf *.tar.gz
          cd $(find . -maxdepth 1 -type d | tail -n 1)
          
          # tree-sitter grammars com sdist incompleto: buscar arquivos faltantes do repo GitHub
          if echo "${{ inputs.package_name }}" | grep -qi '^tree-sitter-'; then
            TS_PKG="${{ inputs.package_name }}"
            TS_VER="${{ inputs.package_version }}"
            TS_REFS="v$TS_VER $TS_VER master main"
            # 1) common/scanner.h (+util.h) — grammars multi (typescript, php)
            if grep -rq '\.\./\.\./common/' --include='*.c' . 2>/dev/null && [ ! -s common/scanner.h ]; then
              mkdir -p common
              for ORG in tree-sitter tree-sitter-grammars; do for REF in $TS_REFS; do for HF in scanner.h util.h; do
                [ -s "common/$HF" ] && continue
                content=$(curl -sfL "https://raw.githubusercontent.com/$ORG/$TS_PKG/$REF/common/$HF" 2>/dev/null || true)
                [ -n "$content" ] && printf '%s' "$content" > "common/$HF"
              done; done; done
            fi
            # 2) src/scanner.c — grammars com external scanner cujo sdist omitiu (python)
            if [ ! -f src/scanner.c ] && grep -rqE "external_scanner" --include='*.c' --include='*.h' . 2>/dev/null; then
              for ORG in tree-sitter tree-sitter-grammars; do for REF in $TS_REFS; do
                [ -f src/scanner.c ] && break
                content=$(curl -sfL "https://raw.githubusercontent.com/$ORG/$TS_PKG/$REF/src/scanner.c" 2>/dev/null || true)
                [ -n "$content" ] && printf '%s' "$content" > src/scanner.c
              done; done
            fi
          fi
          
          echo "🔍 Detectando tipo de projeto..."
          
          # DETECTA TIPO DE PROJETO E USA FERRAMENTA APROPRIADA
          if [ -f "Cargo.toml" ]; then
            echo "🦀 Projeto Rust detectado (Cargo.toml) → usando maturin"
            PYTHON_VER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
            
            # Tenta build com maturin + Android Python sysroot
            if maturin build $MATURIN_BUILD_ARGS --out ../../dist; then
              echo "✅ Build Rust concluído com sucesso"
            else
              echo "⚠️  Build Rust falhou - tentando fallback: pre-built wheel..."
              # Fallback: baixar wheel manylinux (pode funcionar no Termux com patchelf)
              cd ../..
              pip download --only-binary :all: --platform manylinux_2_34_aarch64 \
                --platform manylinux2014_aarch64 \
                --platform linux_aarch64 \
                -d dist \
                "$PKG${VER:+==$VER}" 2>/dev/null || \
              pip download --only-binary :all: -d dist "$PKG${VER:+==$VER}" 2>/dev/null || true
              ls dist/ 2>/dev/null || echo "⚠️ Nenhuma wheel alternativa encontrada"
            fi
            
          elif [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            echo "🐍 Projeto C/C++/Cython detectado → cross-compilando extensão nativa para ${{ env.TARGET }}"
            # Cross-compile env: setuptools/distutils alvo Android (mesma estratégia fake-lib do Rust)
            NDK_BIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
            export CC="${NDK_BIN}/${{ env.TARGET }}${{ env.ANDROID_API }}-clang"
            export CXX="${NDK_BIN}/${{ env.TARGET }}${{ env.ANDROID_API }}-clang++"
            export AR="${NDK_BIN}/llvm-ar"
            export RANLIB="${NDK_BIN}/llvm-ranlib"
            export STRIP="${NDK_BIN}/llvm-strip"
            export LDSHARED="${CC} -shared"
            export CFLAGS="--target=${{ env.TARGET }}${{ env.ANDROID_API }} -fPIC -include stdbool.h -L${{ github.workspace }}/fake_libs"
            export CXXFLAGS="--target=${{ env.TARGET }}${{ env.ANDROID_API }} -fPIC -include stdbool.h -L${{ github.workspace }}/fake_libs"
            export LDFLAGS="--target=${{ env.TARGET }}${{ env.ANDROID_API }} -L${{ github.workspace }}/fake_libs -Wl,--unresolved-symbols=ignore-all -Wl,--allow-shlib-undefined"
            case "${{ env.ARCH }}" in
              # Tag android_<api>_<abi>: bate com o python DEFAULT do Termux (3.14+ reporta android-<api>-<abi>), onde existe numpy via pkg. Para Termux python antigo (linux-aarch64), troque por linux-<arch>.
              aarch64) _HOST_PLATFORM="android-${{ env.ANDROID_API }}-arm64_v8a" ;;
              x86_64)  _HOST_PLATFORM="android-${{ env.ANDROID_API }}-x86_64" ;;
              armv7l)  _HOST_PLATFORM="android-${{ env.ANDROID_API }}-armeabi_v7a" ;;
              i686)    _HOST_PLATFORM="android-${{ env.ANDROID_API }}-x86" ;;
            esac
            export _PYTHON_HOST_PLATFORM="${_HOST_PLATFORM}"
            pip install --upgrade pip build wheel setuptools cython
            # tree-sitter grammars: selecionar parser.h pela LANGUAGE_VERSION do parser.c
            LANG_VER=$(grep -rhoE "LANGUAGE_VERSION +[0-9]+" $(find . -name parser.c 2>/dev/null) 2>/dev/null | head -1 | grep -oE "[0-9]+$" || true)
            if [ -n "$LANG_VER" ] && [ "$LANG_VER" -le 14 ]; then
              TS_INC="${{ github.workspace }}/.github/vendor/tree_sitter_v14"
              echo "   tree-sitter LANGUAGE_VERSION=$LANG_VER → parser.h legado (v0.20.8)"
            elif [ -n "$LANG_VER" ]; then
              TS_INC="${{ github.workspace }}/.github/vendor"
              echo "   tree-sitter LANGUAGE_VERSION=$LANG_VER → parser.h moderno"
            else
              TS_INC="${{ github.workspace }}/.github/vendor"
            fi
            export CFLAGS="${CFLAGS} -I${TS_INC}"
            export CXXFLAGS="${CXXFLAGS} -I${TS_INC}"
            if [ -f "pyproject.toml" ]; then
              python -m build --wheel --outdir ../../dist
            else
              pip wheel . -w ../../dist --no-deps
            fi

          else
            echo "❌ Tipo de projeto não reconhecido (sem Cargo.toml, pyproject.toml ou setup.py)"
            exit 1
          fi

      - name: 📤 Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package_name }}-android-${{ inputs.arch }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 30